<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seviyorum ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      color: white;
      text-align: center;
    }

    .container {
      margin-top: 100px;
    }

    iframe {
      display: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Seni Seviyorum ❤️</h1>
    <p>Bu site senin için yapıldı</p>
    <button onclick="baslat()">Müziği Başlat 🎵</button>
  </div>

  <!-- YouTube müzik -->
  <iframe id="muzik"
    src=""
    allow="autoplay">
  </iframe>

  <script>
    function baslat() {
      document.getElementById("muzik").src =
      "https://www.youtube.com/embed/2nGKqH26xlg?autoplay=1";
    }
  </script>

</body>
</html>
